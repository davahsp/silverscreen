<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Silver Screen — Cinema Booking & Ops System</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    /* Prevent flash of unstyled content */
    #root:empty::before {
      content: 'Memuat Silver Screen...';
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 16px;
      color: #9b9b9b;
      position: fixed;
      inset: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React 18 + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Data (plain JS, no JSX) -->
  <script src="js/data.js"></script>

  <!-- React Components — load in dependency order -->
  <script type="text/babel" src="js/context.jsx"></script>
  <script type="text/babel" src="js/ui.jsx"></script>
  <script type="text/babel" src="js/gateway.jsx"></script>
  <script type="text/babel" src="js/customer.jsx"></script>
  <script type="text/babel" src="js/staff.jsx"></script>
  <script type="text/babel" src="js/scheduler.jsx"></script>
  <script type="text/babel" src="js/manager.jsx"></script>
  <script type="text/babel" src="js/app.jsx"></script>
</body>
</html>
