{% extends "cinema/base.html" %}
{% load cinema_tags %}
{% block title %}{{ page_title }}{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">{{ page_title }}</h1>
    <p class="page-subtitle">{{ page_subtitle }}</p>
  </div>
</div>

<form
  id="order-filter"
  class="order-filter orders-wide"
  action="{% url 'cinema:orders_table' %}"
  method="get"
  aria-label="Filter pesanan"
  hx-get="{% url 'cinema:orders_table' %}"
  hx-target="#order-table-partial"
  hx-swap="outerHTML"
  hx-trigger="input changed delay:350ms, change, submit"
>
  <div class="form-group">
    <label class="form-label" for="order-id-filter">Order ID</label>
    <input id="order-id-filter" type="text" name="order_id" value="{{ order_id_filter }}" placeholder="Contoh: ORD">
  </div>
  <div class="form-group">
    <label class="form-label" for="movie-name-filter">Nama Film</label>
    <input id="movie-name-filter" type="text" name="movie_name" value="{{ movie_name_filter }}" placeholder="Cari judul film">
  </div>
  <div class="form-group">
    <label class="form-label" for="order-date-filter">Tanggal Tayang</label>
    <input id="order-date-filter" type="date" name="date" value="{{ date_filter }}">
  </div>
</form>

<div
  id="order-table-partial"
  class="orders-wide"
  hx-get="{% url 'cinema:orders_table' %}"
  hx-trigger="load"
  hx-include="#order-filter"
  hx-swap="outerHTML"
>
  <div class="empty-state">Memuat pesanan...</div>
</div>
{% endblock %}
