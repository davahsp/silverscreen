{% extends "cinema/base.html" %}
{% block title %}Manager Dashboard{% endblock %}
{% block content %}
<div class="page-header"><div><h1 class="page-title">Dashboard Manajer</h1><p class="page-subtitle">Ringkasan master data MVP.</p></div></div>
<div class="stats-grid">
  <div class="stat-card"><div class="text-muted">Film</div><div class="stat-value">{{ movie_count }}</div></div>
  <div class="stat-card"><div class="text-muted">Produk</div><div class="stat-value">{{ product_count }}</div></div>
  <div class="stat-card"><div class="text-muted">Studio</div><div class="stat-value">{{ studio_count }}</div></div>
  <div class="stat-card"><div class="text-muted">Jam Tayang</div><div class="stat-value">{{ showtime_count }}</div></div>
</div>
{% endblock %}
