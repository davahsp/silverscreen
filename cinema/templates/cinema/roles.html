{% extends "cinema/base.html" %}
{% block title %}Pilih Role{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Pilih Role Demo</h1>
    <p class="page-subtitle">MVP menggunakan role switcher sederhana tanpa autentikasi penuh.</p>
  </div>
</div>
<div class="card">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="{{ form.role.id_for_label }}">Role</label>
        {{ form.role }}
      </div>
      <button class="button button-primary">Masuk</button>
    </form>
  </div>
</div>
{% endblock %}
