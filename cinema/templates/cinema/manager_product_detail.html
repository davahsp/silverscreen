{% extends "cinema/base.html" %}
{% block title %}Detail Produk{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">{{ product.name }}</h1>
    <p class="page-subtitle">Detail katalog produk.</p>
  </div>
  <a class="button button-secondary" href="{% url 'cinema:manager_products' %}">Kembali</a>
</div>
<div id="manager-product-detail" class="card manager-detail-panel" hx-get="{% url 'cinema:manager_product_detail_partial' product.pk %}" hx-trigger="load" hx-swap="outerHTML">
  <div class="card-body">Memuat detail produk...</div>
</div>
{% endblock %}
